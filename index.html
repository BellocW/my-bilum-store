<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Bilums & Crafts Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🌿 CraftPNG</div>
            <ul>
                <li><button onclick="toggleDarkMode()" class="nav-btn">🌙 Mode</button></li>
                <li><a href="#" onclick="toggleModal('login-modal')">Login</a></li>
                <li><a href="#" id="cart-count" onclick="toggleModal('cart-modal')">Cart (0)</a></li>
                <li><a href="#">Total: K<span id="cart-total">0.00</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Authentic Handmade Bilums & Tropical Plants</h1>
            <div class="category-tabs">
                <button class="tab-btn" onclick="filterByCategory('All')">All</button>
                <button class="tab-btn" onclick="filterByCategory('Bilums')">Bilums</button>
                <button class="tab-btn" onclick="filterByCategory('Crafts')">Crafts</button>
                <button class="tab-btn" onclick="filterByCategory('Plants')">Plants</button>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for bilums, plants..." onkeyup="filterProducts()">
            </div>
        </section>

        <section class="product-grid" id="product-container"></section>

        <section class="contact-section">
            <h2>Contact the Maker</h2>
            <form id="contact-form" onsubmit="event.preventDefault(); alert('Message Sent!');">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Ask about custom bilum patterns or plant care..."></textarea>
                <button type="submit" class="checkout-btn">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('cart-modal')">&times;</span>
            <h2>Your Shopping Cart</h2>
            <div id="cart-items-list"></div>
            <hr>
            <p><strong>Total: K<span id="modal-total">0.00</span></strong></p>
            <div class="modal-footer">
                <button onclick="clearCart()" class="clear-btn">Clear Cart</button>
                <button onclick="checkout()" class="checkout-btn">Order via WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('login-modal')">&times;</span>
            <h2>Login</h2>
            <input type="text" placeholder="Username" class="login-input">
            <input type="password" placeholder="Password" class="login-input">
            <button class="checkout-btn" style="width:100%" onclick="alert('Logged in!')">Sign In</button>
        </div>
    </div>

    <!-- WhatsApp Floating Button -->
    <div class="whatsapp-float">
        <a href="https://wa.me" target="_blank">Chat with us 💬</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
